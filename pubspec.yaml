name: zen_mart_pro
description: A complete Multi-Vendor E-Commerce Ecosystem.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core & Services
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  firebase_messaging: ^15.0.0

  # Navigation & Routing
  go_router: ^14.0.0

  # State Management
  provider: ^6.1.2

  # UI & Utilities
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Register assets for Zenvyro Labs branding requirement
  assets:
    - assets/images/